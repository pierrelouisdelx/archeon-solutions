services:
  postgres:
    image: postgres:16-alpine
    container_name: archeon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: archeon
      POSTGRES_PASSWORD: archeon
      POSTGRES_DB: archeon
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archeon -d archeon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
